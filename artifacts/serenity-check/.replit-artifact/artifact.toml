kind = "web"
previewPath = "/"
title = "Serenity Check"
version = "1.0.0"
id = "artifacts/serenity-check"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21567

[services.development]
run = "pnpm --filter @workspace/serenity-check run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/serenity-check", "run", "build" ]
publicDir = "artifacts/serenity-check/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21567"
BASE_PATH = "/"
