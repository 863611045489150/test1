openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: guided-chat
    description: AI-powered guided wellness chat
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /guided-chat/questions:
    post:
      operationId: generateGuidedQuestions
      tags: [guided-chat]
      summary: Generate follow-up questions
      description: Uses AI to generate 6-7 empathetic follow-up questions based on user input
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateQuestionsBody"
      responses:
        "200":
          description: Generated questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateQuestionsResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    GenerateQuestionsBody:
      type: object
      properties:
        userInput:
          type: string
          minLength: 1
          maxLength: 1000
      required:
        - userInput

    GenerateQuestionsResponse:
      type: object
      properties:
        questions:
          type: array
          items:
            type: string
          minItems: 6
          maxItems: 7
      required:
        - questions

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
