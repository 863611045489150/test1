[build]
  command = "pnpm install --frozen-lockfile && pnpm --filter @workspace/serenity-check run build"
  publish = "artifacts/serenity-check/dist/public"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9"
  NODE_ENV = "production"
  BASE_PATH = "/"
  PORT = "3000"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
